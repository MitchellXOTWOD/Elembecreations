<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elembe Creations | Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Elembe Creations</h1>
            <p>Custom Quilts, Hems & Stitching</p>
        </div>
        
        <button class="menu-toggle" aria-label="Toggle navigation">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <nav class="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="order.html">Place an Order</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="gallery-intro">
            <h2>Our Handcrafted Work</h2>
            <p>A look at some of our favorite custom quilts, clothing alterations, and precision stitching projects.</p>
        </section>

        <section class="gallery-grid">

        </section>
    </main>

    <footer>
        <p>&copy; 2026 Elembe Creations. All Rights Reserved.</p>
    </footer>

    <script src="js/main.js"></script>
    <script>
    // Wait for the webpage to load, then look at the CMS data file
        fetch('/data/gallery.json')
            .then(response => {
            if (!response.ok) throw new Error("No gallery items found yet.");
            return response.json();
            })
            .then(data => {
            const galleryContainer = document.getElementById('gallery-grid');
            const images = data.items || []; 
            
            // Loop through every item your client uploaded
            images.forEach(item => {
                // 1. Create a container for the image card
                const card = document.createElement('div');
                card.className = 'gallery-card';
                
                // 2. Create the image element
                const imgElement = document.createElement('img');
                imgElement.src = item.image; // Pulls path from JSON
                imgElement.alt = item.title;
                imgElement.className = 'gallery-thumb';
                
                // 3. Create a title text element
                const titleElement = document.createElement('h3');
                titleElement.textContent = item.title;
                
                // 4. Create a category badge element
                const categoryElement = document.createElement('span');
                categoryElement.textContent = item.category;
                categoryElement.className = 'category-badge';
                
                // Assemble the card and throw it into the gallery grid
                card.appendChild(imgElement);
                card.appendChild(titleElement);
                card.appendChild(categoryElement);
                galleryContainer.appendChild(card);
            });
            })
            .catch(err => {
            console.log("Gallery is currently empty or loading:", err);
            // Optional: Display a fallback message if she hasn't uploaded anything yet
            document.getElementById('gallery-grid').innerHTML = "<p>Check back soon for updates!</p>";
            });
    </script>
</body>
</html>
