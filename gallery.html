<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elembe Creations | Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Elembe Creations</h1>
            <p>Custom Quilts, Hems & Stitching</p>
        </div>
        
        <button class="menu-toggle" aria-label="Toggle navigation">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <nav class="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="order.html">Place an Order</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="gallery-intro">
            <h2>Our Handcrafted Work</h2>
            <p>A look at some of our favorite custom quilts, clothing alterations, and precision stitching projects.</p>
        </section>

        <section id="gallery-grid" class="gallery-grid">

        </section>
    </main>

    <footer>
        <p>&copy; 2026 Elembe Creations. All Rights Reserved.</p>
    </footer>

    <script src="js/main.js"></script>
    <script>
    // Fetch the unified batch data from the CMS
    fetch('/data/gallery.json')
        .then(response => {
        if (!response.ok) throw new Error("No gallery items found.");
        return response.json();
        })
        .then(data => {
        const galleryContainer = document.querySelector('.gallery-grid');
        const images = data.items || []; 
        
        // Clear out any loading indicators
        galleryContainer.innerHTML = ''; 

        images.forEach(item => {
            // 1. Create the main card element matching your CSS (.gallery-item)
            const card = document.createElement('div');
            card.className = 'gallery-item';
            
            // 2. Create the image element (automatically styled by .gallery-item img)
            const imgElement = document.createElement('img');
            imgElement.src = item.image;
            imgElement.alt = item.title;
            
            // 3. Create the text info wrapper (.item-info)
            const infoDiv = document.createElement('div');
            infoDiv.className = 'item-info';
            
            // 4. Create the title header matching your CSS (.item-info h4)
            const titleElement = document.createElement('h4');
            titleElement.textContent = item.title;
            
            // 5. Create the category tag matching your CSS (.item-info p)
            const categoryElement = document.createElement('p');
            categoryElement.textContent = item.category;
            
            // Assemble the text content container
            infoDiv.appendChild(titleElement);
            infoDiv.appendChild(categoryElement);
            
            // Assemble the main card and append it to the grid
            card.appendChild(imgElement);
            card.appendChild(infoDiv);
            galleryContainer.appendChild(card);
        });
        })
        .catch(err => {
        console.log("Gallery loading layout state:", err);
        document.querySelector('.gallery-grid').innerHTML = "<p>Check back soon for updates!</p>";
        });
    </script>
</body>
</html>
