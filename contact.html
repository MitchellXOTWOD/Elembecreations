<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elembe Creations | Contact</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Main Navigation Bar (Active link moved to Contact) -->
    <header>
        <div class="logo">
            <h1>Elembe Creations</h1>
            <p>Custom Quilts, Hems & Stitching</p>
        </div>
        
        <button class="menu-toggle" aria-label="Toggle navigation">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <nav class="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="order.html">Place an Order</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Contact Content -->
    <main class="contact-container">
        <section class="contact-intro">
            <h2>Get in Touch</h2>
            <p>Have a question about a quilt, or need a garment hemmed? Drop a message below, and I will get back to you as soon as possible!</p>
        </section>

        <!-- Contact Form -->
        <form action="https://formsubmit.co/slimmitch.mn@gmail.com" method="POST" class="contact-form">
            
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" placeholder="E.g., Jane Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Your Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" placeholder="Tell me about your sewing or stitching project..." required></textarea>
            </div>

            <button type="submit" class="btn form-btn">Send Message</button>
        </form>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Elembe Creations. All Rights Reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
