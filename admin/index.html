<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elembe Creations Content Manager</title>
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      // 3. Wait until the browser has built the HTML structure completely
      window.addEventListener('DOMContentLoaded', () => {
        
        // Initialize the Identity Widget with your direct endpoint
        if (window.netlifyIdentity) {
          window.netlifyIdentity.init({
            APIUrl: 'https://elembecreations.netlify.app/.netlify/identity'
          });

          // Handle seamless redirection once logged in
          window.netlifyIdentity.on("init", (user) => {
            if (!user) {
              window.netlifyIdentity.on("login", () => {
                document.location.href = "/admin/";
              });
            }
          });
        }
      });
    </script>
  </body>
</html>
