backend:
  name: git-gateway
  branch: main
  identity_url: "https://elembecreations.netlify.app/.netlify/identity"
  gateway_url: "https://elembecreations.netlify.app/.netlify/git"

media_folder: "assets/images/gallery" # Where uploaded images will save in your project
public_folder: "/assets/images/gallery"

collections:
  - name: "gallery_page"
    label: "Gallery Management"
    delete: false # Prevents accidental deletion of the whole gallery file
    editor:
      preview: false # Keeps the interface clean and fast
    files:
      - name: "gallery"
        label: "Gallery Page"
        file: "data/gallery.json" # Everything saves inside this single file
        fields:
          - label: "Gallery Items"
            name: "items"
            widget: "list" # ◄ This turns the dashboard into a repeatable list
            summary: "{{fields.title}} ({{fields.category}})" # Previews the row info
            label_singular: "New Item"
            fields:
              - { label: "Name", name: "title", widget: "string" }
              - { label: "Gallery Image", name: "image", widget: "image" }
              - { label: "Category", name: "category", widget: "string" }
  - name: "order_products_page"
    label: "Order Page Products"
    delete: false
    editor:
      preview: false
    # ⬇ This isolates product images into a completely unique folder
    media_folder: "assets/images/orders"
    public_folder: "/assets/images/orders"
    files:
      - name: "order_products"
        label: "Available Products"
        file: "data/order_products.json" # ⬇ Separate JSON data storage file
        fields:
          - label: "Product Inventory"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} ({{fields.price}})"
            label_singular: "New Product Tile"
            fields:
              - { label: "Product Name", name: "title", widget: "string" }
              - { label: "Product Image", name: "image", widget: "image" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Price (e.g., $45)", name: "price", widget: "string" }