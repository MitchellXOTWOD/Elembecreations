# Backend configuration utilizing your existing Netlify Git Gateway
backend:
  name: git-gateway
  branch: main # Change to master if your default branch is master

# Where uploaded media (craft photos) will live in your repo
media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

# Define the collections (the structures for your dashboard forms)
collections:
  - name: "gallery"
    label: "Craft Gallery"
    folder: "data/gallery" # Where individual .json files will be generated
    create: true # Allows client to add new items
    slug: "{{title}}-{{uniqid}}" # Prevents file name collisions
    extension: "json"
    format: "json"
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Project Description", name: "description", widget: "text", required: false }
      - { label: "Featured Craft Image", name: "image", widget: "image" }
      - { label: "Date Added", name: "date", widget: "datetime" }